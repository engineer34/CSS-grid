<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8">
<title>Admin DashBoard</title>

<link rel="stylesheet" href="style.css">
</head>
 <body>
<div class="dashboard">
  <aside class="sidebar">
<h2>Admin Dashboard</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Settings</a>
  </nav>
  </aside>
  <header class="header">
    <!--- input search bar created and a placeholder 
    and show user as John with spanshows search-->
<input type="search" placeholder="Search..."/>
<div class="user-info">
      <span> John</span>
    </div>
    </header>
    <!--- primary content of the page-->
  <main class="content">
    <!-- sections inside main content-->
    <section class="projects">
    <h3>Your Projects</h3>
      <div class="project-grid">
<!---div is creating a container-->
        <div class="card">Project One</div>
        <div class="card">Project Two</div>
        </div>
        </section>
    <section class="announcements"><h3>Announcements</h3>
      <ul>
        <li> New feature released</li>
        
        <li> Policy update</li>
      </ul></section>
    <section class="trending">
      <h4>Trending</h4>
      <ul>
        <li> CSS grid</li>
        <li> Advanced Web Development</li>
        <li> Dashboard UI</li>
      </ul></section>
    </section>
  </main>
</div>
</body>
</html>
